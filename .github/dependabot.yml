# Dependabot configuration for automated dependency updates
# Generated by gh-update tool
version: 2

updates:
  # Pip dependency updates
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    rebase-strategy: disabled
    groups:
      pip-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - python

  # Docker dependency updates
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    rebase-strategy: disabled
    groups:
      docker-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - docker

  # Github-Actions dependency updates
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    rebase-strategy: disabled
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - gha

